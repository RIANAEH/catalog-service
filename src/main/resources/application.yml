# ===========================================
# [클라우드 네이티브 스프링 - 애플리케이션 설정]
# application.yml: Spring Boot의 외부 설정 파일
# - application.properties보다 계층 구조 표현에 유리
# - 프로파일별 설정 분리 가능 (application-{profile}.yml)
# ===========================================

spring:
  application:
    # [클라우드 네이티브 - 서비스 식별]
    # 마이크로서비스 환경에서 서비스 식별에 사용
    # - 서비스 디스커버리(Eureka, Consul)에 등록되는 이름
    # - 분산 추적(Zipkin, Jaeger)에서 서비스 구분
    # - 로그 집계 시 서비스 식별자로 활용
    name: catalog-service

  # ===========================================
  # [클라우드 네이티브 스프링 - 데이터소스 설정]
  # [15-Factor #4 Backing Services] DB를 연결된 리소스로 취급
  # ===========================================
  datasource:
    # [15-Factor #3 Config] 환경 변수로 오버라이드 가능
    # - SPRING_DATASOURCE_URL
    # - SPRING_DATASOURCE_USERNAME
    # - SPRING_DATASOURCE_PASSWORD
    url: jdbc:postgresql://localhost:5432/polardb_catalog
    username: user
    password: password

    # [클라우드 네이티브 - HikariCP 커넥션 풀]
    # Spring Boot 기본 커넥션 풀
    # - 고성능, 경량 커넥션 풀
    # - 컨테이너 환경에서 리소스 효율적 관리
    hikari:
      # 커넥션 타임아웃: 풀에서 커넥션 획득 대기 시간
      connection-timeout: 2000
      # 최대 풀 크기: 동시 DB 연결 수 제한
      # [실무 조언] 컨테이너 리소스와 DB 연결 한도 고려하여 설정
      maximum-pool-size: 5

  # [클라우드 네이티브 스프링 - Spring Data JDBC 설정]
  jdbc:
    template:
      # 쿼리 타임아웃 (초): 장시간 쿼리 방지
      query-timeout: 5

  # [클라우드 네이티브 스프링 - Flyway 설정]
  flyway:
    # baseline-on-migrate: 기존 스키마가 있는 DB에 Flyway 도입 시 필요
    # - 기존 테이블이 있지만 flyway_schema_history가 없을 때
    # - V1 마이그레이션을 baseline으로 처리하고 V2부터 실행
    # [실무 조언] 신규 프로젝트에서는 불필요, 기존 DB 마이그레이션 시에만 사용
    baseline-on-migrate: true

server:
  # [실무 조언 - 포트 설정]
  # 기본 포트 8080 대신 고유 포트 사용
  # - 로컬 개발 시 여러 서비스 동시 실행 가능
  # - 클라우드 환경에서는 환경 변수로 오버라이드: SERVER_PORT
  port: 9001

  tomcat:
    # [클라우드 네이티브 - 연결 타임아웃]
    # connection-timeout: 클라이언트 연결 수립 대기 시간
    # - 너무 길면 리소스 낭비, 너무 짧으면 정상 요청 거부
    # - 클라우드 환경에서는 로드밸런서 타임아웃과 조율 필요
    connection-timeout: 2s

    # [클라우드 네이티브 - Keep-Alive]
    # keep-alive-timeout: 연결 재사용 대기 시간
    # - HTTP/1.1 연결 재사용으로 성능 향상
    # - 너무 길면 유휴 연결이 리소스 점유
    # - 쿠버네티스 환경에서는 서비스 메시와 조율 필요
    keep-alive-timeout: 15s

    threads:
      # [클라우드 네이티브 - 스레드 풀 설정]
      # max: 최대 워커 스레드 수 (동시 요청 처리 한계)
      # - 컨테이너 CPU/메모리 리소스에 맞게 조정
      # - 너무 높으면 컨텍스트 스위칭 오버헤드 증가
      max: 50

      # min-spare: 유휴 상태로 유지할 최소 스레드 수
      # - 갑작스러운 트래픽 증가에 대비
      # - 너무 높으면 리소스 낭비
      #
      # [실무 조언]
      # - 프로덕션에서는 부하 테스트 후 적정값 설정
      # - 쿠버네티스 HPA와 함께 사용 시 Pod 스케일링과 조율
      min-spare: 5

# ===========================================
# [커스텀 설정 - Polar Bookshop]
# @ConfigurationProperties로 타입 안전하게 바인딩
# ===========================================
polar:
  # [클라우드 네이티브 - 환경별 설정]
  # 환경 변수로 오버라이드: POLAR_GREETING
  # 쿠버네티스 ConfigMap으로 환경별 메시지 설정 가능
  greeting: "Welcome to the local book catalog!"
